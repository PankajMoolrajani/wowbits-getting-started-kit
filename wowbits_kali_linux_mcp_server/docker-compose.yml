services:
  kali-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wowbits-kali-api
    # Port 5000 is internal only — not exposed to the host.
    # The mcp-server container talks to it via the Docker network as http://kali-api:5000
    expose:
      - "5000"
    environment:
      - LOG_LEVEL=INFO
      - PORT=5000
      - HOST=0.0.0.0
      - ENFORCE_ALLOWLIST=false
    cap_add:
      # Required for nmap raw-socket scans (SYN/UDP/OS detection)
      - NET_RAW
      - NET_ADMIN
    # Mount a shared data folder so agents can retrieve files written by wget, etc.
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: wowbits-kali-mcp
    ports:
      # This is the only port exposed to the outside world.
      # Agents and wowbits connect here: http://localhost:8765/mcp
      - "8765:8765"
    environment:
      - KALI_API_URL=http://kali-api:5000
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8765
      - LOG_LEVEL=INFO
    depends_on:
      kali-api:
        condition: service_healthy
    restart: unless-stopped
